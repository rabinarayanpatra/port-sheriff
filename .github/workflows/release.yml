name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & attach .app
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build .app bundle
        run: ./scripts/build-app.sh

      - name: Zip the .app
        run: |
          cd build
          ditto -c -k --sequesterRsrc --keepParent PortSheriff.app PortSheriff-${{ github.ref_name }}.zip

      - name: Generate checksum
        run: |
          cd build
          shasum -a 256 PortSheriff-${{ github.ref_name }}.zip > PortSheriff-${{ github.ref_name }}.zip.sha256

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/PortSheriff-${{ github.ref_name }}.zip
            build/PortSheriff-${{ github.ref_name }}.zip.sha256
          generate_release_notes: true
